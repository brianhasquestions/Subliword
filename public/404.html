<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Subliword</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .notfound-page {
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 20px;
      min-height: 100vh;
      text-align: center;
    }

    .notfound-page h1 {
      font-size: 4rem;
      margin-bottom: 10px;
    }

    .notfound-page p {
      margin-bottom: 30px;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-red);
      text-decoration: none;
      font-size: 1rem;
    }

    .home-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="notfound-page">
    <h1>404</h1>
    <p>This page doesn't exist — it went by too fast.</p>
    <a class="home-link" href="/">&larr; Back to Subliword</a>
  </div>
</body>
</html>
